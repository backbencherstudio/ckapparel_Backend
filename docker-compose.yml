name: backend-common-infra

services:
  minio:
    image: minio/minio
    container_name: minio-server
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  minio-client:
    image: minio/mc:latest
    container_name: minio-client
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      tail -f /dev/null"

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"

  turnserver:
    image: coturn/coturn
    container_name: turn-server
    restart: always
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "55000-55050:55000-55050/udp"
    volumes:
      - ./dockerfiles/coturn/turnserver.conf:/etc/turnserver.conf:ro
    environment:
      - TURN_USERNAME=webrtc
      - TURN_PASSWORD=strongpassword

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    depends_on:
      - turnserver
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "7881:7881/udp"
      - "55100-55150:55100-55150/udp"
    environment:
      LIVEKIT_LOG_LEVEL: info
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret}"
    command: >
      --dev
      --bind 0.0.0.0
      --node-ip 127.0.0.1
      --udp-port 55100-55150
